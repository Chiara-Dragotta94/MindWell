name: Deploy frontend su GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Installa dipendenze frontend
        working-directory: client
        run: npm ci

      - name: Verifica configurazione API produzione
        run: |
          if [ -z "${{ secrets.VITE_API_BASE_URL }}" ]; then
            echo "Manca il secret VITE_API_BASE_URL nelle impostazioni del repository."
            echo "Aggiungilo in: Settings > Secrets and variables > Actions > New repository secret"
            exit 1
          fi

      - name: Crea .env.production per la build
        working-directory: client
        run: echo "VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}" > .env.production

      - name: Build frontend per GitHub Pages
        working-directory: client
        run: npm run build:gh

      - name: Configura GitHub Pages
        uses: actions/configure-pages@v5

      - name: Carica artifact Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: client/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy su GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
